<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B LeadGen Pro | 営業リスト自動生成ツール</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#1e40af',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 shadow-sm py-4 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-building-user text-primary text-2xl"></i>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">B2B LeadGen Pro</h1>
            </div>
            <p class="text-sm text-slate-500 font-medium">営業リスト自動生成ツール</p>
        </div>
    </header>

    <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-8">
        <!-- Error Message Container -->
        <div id="errorMessage" class="hidden mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-r-md shadow-sm">
            <div class="flex items-center">
                <i class="fa-solid fa-circle-exclamation text-red-500 mr-3"></i>
                <p id="errorText" class="text-red-700 text-sm font-medium"></p>
            </div>
        </div>

        <!-- Search Section -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
            <label for="keywordInput" class="block text-sm font-semibold text-slate-700 mb-2">検索キーワード</label>
            <div class="flex flex-col sm:flex-row gap-4">
                <div class="relative flex-1">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
                    </div>
                    <input type="text" id="keywordInput" value="Python" placeholder="例: ITエンジニア, 建設業, 営業..." 
                        class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-colors text-slate-900 bg-slate-50 focus:bg-white">
                </div>
                <button id="searchBtn" class="bg-primary hover:bg-secondary text-white font-medium py-3 px-6 rounded-lg transition-all duration-200 shadow-sm flex items-center justify-center gap-2 min-w-[160px] disabled:opacity-70 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-bolt" id="searchIcon"></i>
                    <i class="fa-solid fa-circle-notch fa-spin hidden" id="spinnerIcon"></i>
                    <span id="btnText">検索実行</span>
                </button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultsContainer" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden transition-all duration-500">
            <div class="bg-slate-50 border-b border-slate-200 px-6 py-4 flex justify-between items-center flex-wrap gap-4">
                <h2 class="text-lg font-semibold text-slate-800">
                    抽出結果 <span id="resultCount" class="bg-slate-200 text-slate-700 py-1 px-2 rounded-md text-sm ml-2">0件</span>
                </h2>
                <!-- CSV Download Button (Hidden until data is ready) -->
                <button id="downloadBtn" class="hidden bg-emerald-50 text-emerald-600 border border-emerald-200 hover:bg-emerald-100 hover:text-emerald-700 font-medium py-2 px-4 rounded-md transition-colors text-sm flex items-center gap-2">
                    <i class="fa-solid fa-file-csv"></i> CSVダウンロード
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500 font-semibold">
                            <th class="px-6 py-4">企業名</th>
                            <th class="px-6 py-4">所在地</th>
                            <th class="px-6 py-4">求人職種</th>
                            <th class="px-6 py-4">掲載日</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100 text-sm text-slate-700">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-6 mt-auto">
        <div class="max-w-6xl mx-auto px-4 text-center text-slate-500 text-sm">
            &copy; 2026 B2B LeadGen Pro. All rights reserved.
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
